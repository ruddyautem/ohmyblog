name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy ohmyblog to VPS
    runs-on: ubuntu-latest

    env:
      WORKING_DIR: /home/autem-ohmyblog/htdocs/ohmyblog.autem.dev
      SSH_CMD: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}

    steps:
      # 1. Setup SSH
      - name: Configure SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # 2. Ensure repo exists (in case .git is missing)
      - name: Ensure .git exists and remote is set
        run: |
          ${{ env.SSH_CMD }} "sudo -u ruddya bash -c '
            cd $WORKING_DIR
            if [ ! -d .git ]; then
              git init
              git remote add origin git@github.com:ruddyautem/ohmyblog.git
            fi
          '"

      # 3. Reset tracked files only (preserve pm2.config.cjs, logs, etc.)
      - name: Reset Git state to origin/main
        run: |
          ${{ env.SSH_CMD }} "sudo -u ruddya bash -c '
            cd $WORKING_DIR
            git fetch origin main
            git reset --hard origin/main
          '"

      # 4. Install dependencies with Bun and build
      - name: Install and Build
        run: |
          ${{ env.SSH_CMD }} "sudo -u ruddya bash -c '
            cd $WORKING_DIR
            /home/ruddya/.bun/bin/bun install
            /home/ruddya/.bun/bin/bun run build
          '"

      # 5. Reload app using PM2
      - name: Reload PM2
        run: |
          ${{ env.SSH_CMD }} "sudo -u ruddya bash -c '
            cd $WORKING_DIR
            pm2 reload pm2.config.cjs --update-env
            pm2 save
          '"

      # 6. Clean up SSH key from runner
      - name: Clean SSH keys
        run: rm -rf ~/.ssh
