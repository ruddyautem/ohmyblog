name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WORK_DIR: /home/autem-ohmyblog/htdocs/ohmyblog.autem.dev
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts
          echo "Host *" > ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          
      - name: Test SSH connection
        run: ssh -vvv ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "echo 'SSH connection successful'"
        
      - name: Clean build folder
        run: ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "cd ${{ env.WORK_DIR }} && rm -rf dist"
        
      - name: Git reset
        run: ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "cd ${{ env.WORK_DIR }} && git reset --hard HEAD"
        
      - name: Git pull
        run: ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "cd ${{ env.WORK_DIR }} && git pull origin main"
        
      - name: Install & build
        run: ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "cd ${{ env.WORK_DIR }} && ~/.bun/bin/bun install && ~/.bun/bin/bun run build"
        
      - name: Reload PM2
        run: ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "cd ${{ env.WORK_DIR }} && pm2 reload pm2.config.cjs --update-env && pm2 save"
        
      - name: Cleanup SSH keys
        run: rm -rf ~/.ssh
