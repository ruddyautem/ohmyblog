name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WORK_DIR: /home/autem-ohmyblog/htdocs/ohmyblog.autem.dev
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_HOST: ${{ secrets.SSH_HOST }}

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          echo "Host *" > ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Test SSH connection
        run: ssh -vvv $SSH_USER@$SSH_HOST "echo 'SSH connection successful'"

      - name: Clean build folder
        run: ssh $SSH_USER@$SSH_HOST "cd $WORK_DIR && rm -rf dist"

      - name: Git reset
        run: ssh $SSH_USER@$SSH_HOST "cd $WORK_DIR && git reset --hard HEAD"

      - name: Git pull
        run: ssh $SSH_USER@$SSH_HOST "cd $WORK_DIR && git pull origin main"

      - name: Install & build
        run: ssh $SSH_USER@$SSH_HOST "cd $WORK_DIR && ~/.bun/bin/bun install && ~/.bun/bin/bun run build"

      - name: Reload PM2
        run: ssh $SSH_USER@$SSH_HOST "cd $WORK_DIR && pm2 reload pm2.config.cjs --update-env && pm2 save"

      - name: Cleanup SSH keys
        run: rm -rf ~/.ssh
