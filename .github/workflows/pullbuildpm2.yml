name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      WORK_DIR: /home/autem-ohmyblog/htdocs/ohmyblog.autem.dev
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_HOST: ${{ secrets.SSH_HOST }}

    steps:
      # 1. Setup SSH
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          echo "Host *" > ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      # 2. Clean old Vite build
      - name: Clean dist folder
        run: ssh $SSH_USER@$SSH_HOST "cd $WORK_DIR && rm -rf dist"

      # 3. Reset Git
      - name: Reset Git
        run: ssh $SSH_USER@$SSH_HOST "cd $WORK_DIR && git reset --hard HEAD"

      # 4. Pull latest code
      - name: Git pull
        run: ssh $SSH_USER@$SSH_HOST "cd $WORK_DIR && git pull origin main"

      # 5. Install deps & build
      - name: Install & Build
        run: ssh $SSH_USER@$SSH_HOST "cd $WORK_DIR && ~/.bun/bin/bun install && ~/.bun/bin/bun run build"

      # 6. PM2 reload
      - name: Reload PM2
        run: ssh $SSH_USER@$SSH_HOST "cd $WORK_DIR && pm2 reload pm2.config.cjs --update-env && pm2 save"

      # 7. Cleanup SSH
      - name: Cleanup SSH
        run: rm -rf ~/.ssh
